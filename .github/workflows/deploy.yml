name: Deploy to Azure

on:
  push:
    branches:
      - main
      - version2

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build Frontend
      run: |
        cd frontend-src
        npm install
        npm run build
        cd ..

    - name: Package Deployment
      run: |
        zip -r deploy.zip app/ frontend/ knowledge_base/ scripts/ requirements.txt Dockerfile main.py Caddyfile docker-compose.yml
        # Intentionally excluding .env, .venv, node_modules, app.db, chroma_db

    - name: Upload to Azure via SCP
      env:
        AZURE_PASSWORD: ${{ secrets.AZURE_PASSWORD }}
        AZURE_USERNAME: ${{ secrets.AZURE_USERNAME }}
        AZURE_HOST: ${{ secrets.AZURE_HOST }}
      run: |
        sudo apt-get update && sudo apt-get install sshpass -y
        sshpass -p "$AZURE_PASSWORD" scp -o StrictHostKeyChecking=no deploy.zip $AZURE_USERNAME@$AZURE_HOST:~/deploy.zip

    - name: Deploy Main Branch
      if: github.ref == 'refs/heads/main'
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.AZURE_HOST }}
        username: ${{ secrets.AZURE_USERNAME }}
        password: ${{ secrets.AZURE_PASSWORD }}
        port: 22
        command_timeout: 30m
        script: |
          echo "=== Deploying MAIN branch ==="
          unzip -o ~/deploy.zip -d ~/library-app
          cd ~/library-app
          touch .env
          if ! grep -q "DATABASE_URL=" .env; then echo "DATABASE_URL=sqlite:///./data/app.db" >> .env; fi
          sudo apt-get update && sudo apt-get install docker-compose -y
          sudo docker stop library-container || true
          sudo docker rm library-container || true
          sudo docker compose down || sudo docker-compose down || true
          sudo docker compose up -d --build || sudo docker-compose up -d --build
          echo "=== Main deployment complete ==="
          sudo docker ps -a
          sudo docker logs library-container --tail 20 || true

    - name: Deploy Version2 Branch (Staging)
      if: github.ref == 'refs/heads/version2'
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.AZURE_HOST }}
        username: ${{ secrets.AZURE_USERNAME }}
        password: ${{ secrets.AZURE_PASSWORD }}
        port: 22
        command_timeout: 30m
        script: |
          echo "=== Deploying VERSION2 branch (staging) ==="
          
          # Unzip to staging directory
          unzip -o ~/deploy.zip -d ~/library-app-v2
          cd ~/library-app-v2
          
          # Copy production secrets
          if [ -f ~/library-app/.env ]; then
            cp ~/library-app/.env .env
            echo "Copied production .env"
          else
            touch .env
            echo "DATABASE_URL=sqlite:///./data/app.db" >> .env
            echo "Created fresh .env"
          fi
          
          # Create a standalone staging docker-compose (no caddy, no heredoc issues)
          echo "version: '3.8'" > docker-compose.staging.yml
          echo "" >> docker-compose.staging.yml
          echo "services:" >> docker-compose.staging.yml
          echo "  web:" >> docker-compose.staging.yml
          echo "    build: ." >> docker-compose.staging.yml
          echo "    container_name: library-container-v2" >> docker-compose.staging.yml
          echo "    restart: always" >> docker-compose.staging.yml
          echo "    env_file:" >> docker-compose.staging.yml
          echo "      - .env" >> docker-compose.staging.yml
          echo "    volumes:" >> docker-compose.staging.yml
          echo "      - /home/shaheer/library-data-v2:/app/data" >> docker-compose.staging.yml
          
          # Stop old staging container
          sudo docker stop library-container-v2 || true
          sudo docker rm library-container-v2 || true
          
          # Build and start staging container
          sudo docker compose -f docker-compose.staging.yml up -d --build
          
          echo "=== Waiting 5s for container to stabilize ==="
          sleep 5
          
          # Check if container is actually running
          echo "=== Container status ==="
          sudo docker ps -a --filter "name=library-container-v2"
          
          echo "=== Container logs ==="
          sudo docker logs library-container-v2 --tail 50 || true
          
          # Connect staging container to production Caddy network
          PROD_NET=$(sudo docker inspect caddy -f '{{range $k, $v := .NetworkSettings.Networks}}{{$k}}{{end}}' 2>/dev/null || echo "")
          echo "Production network: $PROD_NET"
          
          if [ -n "$PROD_NET" ]; then
            sudo docker network connect $PROD_NET library-container-v2 2>/dev/null || echo "Already connected or failed"
          else
            echo "WARNING: Could not find production Caddy network"
          fi
          
          # Update Caddyfile for v2 subdomain
          if ! grep -q "v2.mychatbot.codes" ~/library-app/Caddyfile; then
            echo "" >> ~/library-app/Caddyfile
            echo "v2.mychatbot.codes {" >> ~/library-app/Caddyfile
            echo "    reverse_proxy library-container-v2:80" >> ~/library-app/Caddyfile
            echo "}" >> ~/library-app/Caddyfile
            echo "Added v2.mychatbot.codes to Caddyfile"
          else
            echo "v2.mychatbot.codes already in Caddyfile"
          fi
          
          echo "=== Current Caddyfile ==="
          cat ~/library-app/Caddyfile
          
          # Reload Caddy
          cd ~/library-app
          sudo docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile 2>&1 || echo "Caddy reload failed"
          
          echo "=== Final container status ==="
          sudo docker ps -a
          echo "=== Staging deployment complete ==="
