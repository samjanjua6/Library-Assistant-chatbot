name: Deploy to Azure

on:
  push:
    branches:
      - main
      - version2

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build Frontend
      run: |
        cd frontend-src
        npm install
        npm run build
        cd ..

    - name: Package Deployment
      run: |
        zip -r deploy.zip app/ frontend/ knowledge_base/ scripts/ requirements.txt Dockerfile main.py Caddyfile docker-compose.yml
        # Intentionally excluding .env, .venv, node_modules, app.db, chroma_db

    - name: Upload to Azure via SCP
      env:
        AZURE_PASSWORD: ${{ secrets.AZURE_PASSWORD }}
        AZURE_USERNAME: ${{ secrets.AZURE_USERNAME }}
        AZURE_HOST: ${{ secrets.AZURE_HOST }}
      run: |
        sudo apt-get update && sudo apt-get install sshpass -y
        sshpass -p "$AZURE_PASSWORD" scp -o StrictHostKeyChecking=no deploy.zip $AZURE_USERNAME@$AZURE_HOST:~/deploy.zip

    - name: Execute Deployment Commands via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.AZURE_HOST }}
        username: ${{ secrets.AZURE_USERNAME }}
        password: ${{ secrets.AZURE_PASSWORD }}
        port: 22
        command_timeout: 30m
        envs: GITHUB_REF
        script: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          echo "Deploying branch: $BRANCH_NAME"
          
          if [ "$BRANCH_NAME" = "main" ]; then
            APP_DIR=~/library-app
            CONTAINER_NAME="library-container"
          else
            APP_DIR=~/library-app-v2
            CONTAINER_NAME="library-container-v2"
          fi
          
          echo "APP_DIR=$APP_DIR  CONTAINER_NAME=$CONTAINER_NAME"
          
          unzip -o ~/deploy.zip -d $APP_DIR
          cd $APP_DIR
          
          # Copy secrets: for staging, reuse production .env; for main, ensure DATABASE_URL exists
          if [ "$BRANCH_NAME" != "main" ] && [ -f ~/library-app/.env ]; then
            cp ~/library-app/.env .env
          else
            touch .env
            if ! grep -q "DATABASE_URL=" .env; then
              echo "DATABASE_URL=sqlite:///./data/app.db" >> .env
            fi
          fi
          
          sudo apt-get update && sudo apt-get install docker-compose -y
          
          # For staging: create a separate docker-compose override file instead of modifying the original
          if [ "$BRANCH_NAME" != "main" ]; then
            # Create a clean staging docker-compose file
            cat > docker-compose.override.yml <<'EOF'
          version: '3.8'
          services:
            web:
              container_name: library-container-v2
              volumes:
                - /home/shaheer/library-data-v2:/app/data
          EOF
            
            # Stop the old staging container if running
            sudo docker stop $CONTAINER_NAME || true
            sudo docker rm $CONTAINER_NAME || true
            sudo docker compose -f docker-compose.yml -f docker-compose.override.yml down || true
            
            # Start only the web service (no caddy) with the override
            sudo docker compose -f docker-compose.yml -f docker-compose.override.yml up -d --build web
            
            # Get the network this staging container is on
            STAGING_NET=$(sudo docker inspect $CONTAINER_NAME -f '{{range $k, $v := .NetworkSettings.Networks}}{{$k}}{{end}}' || echo "")
            
            # Get the network the production caddy is on
            PROD_NET=$(sudo docker inspect caddy -f '{{range $k, $v := .NetworkSettings.Networks}}{{$k}}{{end}}' || echo "")
            
            # Connect the staging container to the production network so Caddy can reach it
            if [ -n "$PROD_NET" ] && [ "$STAGING_NET" != "$PROD_NET" ]; then
              sudo docker network connect $PROD_NET $CONTAINER_NAME || true
            fi
            
            # Update production Caddyfile to route v2.mychatbot.codes to the staging container
            if ! grep -q "v2.mychatbot.codes" ~/library-app/Caddyfile; then
              echo "" >> ~/library-app/Caddyfile
              echo "v2.mychatbot.codes {" >> ~/library-app/Caddyfile
              echo "    reverse_proxy library-container-v2:80" >> ~/library-app/Caddyfile
              echo "}" >> ~/library-app/Caddyfile
            fi
            
            # Reload Caddy AFTER the staging container is running
            cd ~/library-app
            sudo docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile || true
            
          else
            # Main branch: standard deployment
            sudo docker stop $CONTAINER_NAME || true
            sudo docker rm $CONTAINER_NAME || true
            sudo docker compose down || sudo docker-compose down || true
            sudo docker compose up -d --build || sudo docker-compose up -d --build
          fi
          
          echo "Deployment complete for branch: $BRANCH_NAME"
