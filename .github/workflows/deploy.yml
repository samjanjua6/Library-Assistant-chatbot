name: Deploy to Azure

on:
  push:
    branches:
      - main
      - version2

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build Frontend
      run: |
        cd frontend-src
        npm install
        npm run build
        cd ..

    - name: Package Deployment
      run: |
        zip -r deploy.zip app/ frontend/ knowledge_base/ scripts/ requirements.txt Dockerfile main.py Caddyfile docker-compose.yml
        # Intentionally excluding .env, .venv, node_modules, app.db, chroma_db

    - name: Upload to Azure via SCP
      env:
        AZURE_PASSWORD: ${{ secrets.AZURE_PASSWORD }}
        AZURE_USERNAME: ${{ secrets.AZURE_USERNAME }}
        AZURE_HOST: ${{ secrets.AZURE_HOST }}
      run: |
        sudo apt-get update && sudo apt-get install sshpass -y
        sshpass -p "$AZURE_PASSWORD" scp -o StrictHostKeyChecking=no deploy.zip $AZURE_USERNAME@$AZURE_HOST:~/deploy.zip

    - name: Execute Deployment Commands via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.AZURE_HOST }}
        username: ${{ secrets.AZURE_USERNAME }}
        password: ${{ secrets.AZURE_PASSWORD }}
        port: 22
        command_timeout: 30m
        script: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          
          if [ "$BRANCH_NAME" == "main" ]; then
            APP_DIR="~/library-app"
            CONTAINER_NAME="library-container"
          else
            APP_DIR="~/library-app-v2"
            CONTAINER_NAME="library-container-v2"
          fi
          
          unzip -o ~/deploy.zip -d $APP_DIR
          cd $APP_DIR
          touch .env
          if ! grep -q "DATABASE_URL=" .env; then echo "DATABASE_URL=sqlite:///./data/app.db" >> .env; else sed -i 's|DATABASE_URL=.*|DATABASE_URL=sqlite:///./data/app.db|g' .env; fi
          
          sudo apt-get update && sudo apt-get install docker-compose -y
          
          if [ "$BRANCH_NAME" != "main" ]; then
            # Get the exact docker network name used by the production container
            PROD_NET=$(sudo docker inspect library-container -f '{{range $k, $v := .NetworkSettings.Networks}}{{$k}}{{end}}' || echo "library-app_default")
            
            # Modify docker-compose dynamically for staging
            sed -i '/caddy:/,$d' docker-compose.yml
            sed -i 's/library-container/library-container-v2/g' docker-compose.yml
            sed -i 's/library-data:/library-data-v2:/g' docker-compose.yml
            
            # Attach to production network
            echo -e "\nnetworks:\n  default:\n    external: true\n    name: $PROD_NET" >> docker-compose.yml
            
            # Update production Caddyfile and reload
            if ! grep -q "v2.mychatbot.codes" ~/library-app/Caddyfile; then
              echo -e "\n\nv2.mychatbot.codes {\n    reverse_proxy library-container-v2:80\n}" >> ~/library-app/Caddyfile
            else
              # Only replace reverse_proxy inside the v2.mychatbot.codes block, or just leave it since it's already there
              sed -i '/v2.mychatbot.codes/,/}/ s/reverse_proxy.*/reverse_proxy library-container-v2:80/g' ~/library-app/Caddyfile
            fi
            
            cd ~/library-app
            sudo docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile || true
            cd $APP_DIR
          fi
          
          sudo docker stop $CONTAINER_NAME || true
          sudo docker rm $CONTAINER_NAME || true
          sudo docker compose down || sudo docker-compose down || true
          sudo docker compose up -d --build || sudo docker-compose up -d --build
