name: Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build Frontend
      run: |
        cd frontend-src
        npm install
        npm run build
        cd ..

    - name: Package Deployment
      run: |
        zip -r deploy.zip app/ frontend/ knowledge_base/ scripts/ requirements.txt Dockerfile main.py
        # Intentionally excluding .env, .venv, node_modules, app.db, chroma_db

    - name: Upload to Azure via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.AZURE_HOST }}
        username: ${{ secrets.AZURE_USERNAME }}
        password: ${{ secrets.AZURE_PASSWORD }}
        port: 22
        source: "deploy.zip"
        target: "~/"
        rm: true

    - name: Execute Deployment Commands via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.AZURE_HOST }}
        username: ${{ secrets.AZURE_USERNAME }}
        password: ${{ secrets.AZURE_PASSWORD }}
        port: 22
        script: |
          unzip -o ~/deploy.zip -d ~/library-prod
          cd ~/library-prod
          sudo docker build -t library-app .
          sudo docker stop library-container || true
          sudo docker rm library-container || true
          sudo docker run -d -p 80:80 --env-file .env --name library-container library-app
